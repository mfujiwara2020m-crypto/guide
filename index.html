<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin:0px; overflow:hidden;">
    <a-scene embedded vr-mode-ui="enabled: false;" arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <img id="testImage" src="test.png">
        <img id="originalImg" src="original.png">
      </a-assets>

      <a-sky 
        src="#testImage" 
        rotation="0 -90 0" 
        opacity="0.8">
      </a-sky>

      <a-marker preset="hiro">
        
        <a-image 
          src="#originalImg" 
          position="0 0.5 0" 
          rotation="-90 0 0" 
          width="2" height="2">
        </a-image>

        <a-text 
          value="Sano Tech NIGHT" 
          position="0 1.5 0" 
          align="center" 
          color="purple" 
          rotation="-90 0 0" 
          width="6">
        </a-text>

      </a-marker>

      <a-entity camera look-controls></a-entity>
      
    </a-scene>
  </body>
</html>
