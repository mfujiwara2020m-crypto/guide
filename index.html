<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR 360 View - Seimon</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="logarithmicDepthBuffer: true;"
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <img id="seimon" src="360seimon.jpg">
        <img id="originalImg" src="original_v2.png">
        <img id="messageImg" src="message.png">
      </a-assets>

      <a-sky 
        id="bg-sky"
        src="#seimon" 
        rotation="0 -90 0" 
        material="transparent: true; opacity: 0"
        visible="false">
      </a-sky>

      <a-entity camera look-controls>
        <a-image 
          id="original-sprite"
          src="#originalImg" 
          position="0 0 -5" 
          scale="10 7.5 1"
          material="shader: flat; transparent: true; opacity: 0; alphaTest: 0.5; depthWrite: false; depthTest: false;"
          animation="property: scale; to: 2 1.5 1; dur: 3000; easing: easeOutQuad; startEvents: start-shrinking"
          animation__fade="property: material.opacity; to: 1; dur: 500; startEvents: start-fadein">
        </a-image>

        <a-image
          id="message-text"
          src="#messageImg"
          position="0 0.7 -3.0" 
          scale="1 0.5 1" 
          material="shader: flat; transparent: true; opacity: 0; alphaTest: 0.1; depthWrite: false; depthTest: false;"
          visible="false">
        </a-image>
      </a-entity>

      <a-marker preset="hiro" id="marker-switch"></a-marker>

    </a-scene>

    <script>
      const marker = document.querySelector('#marker-switch');
      const sky = document.querySelector('#bg-sky');
      const sprite = document.querySelector('#original-sprite');
      const msg = document.querySelector('#message-text');
      
      let isTriggered = false;

      // iPadのジャイロ起動のための必須処理
      window.addEventListener('click', function () {
          const scene = document.querySelector('a-scene');
          if (scene.hasLoaded) {
              // センサーの許可を促す
              if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                  DeviceOrientationEvent.requestPermission();
              }
          }
      });

      marker.addEventListener('markerFound', () => {
        if (!isTriggered) {
          isTriggered = true;

          // 背景（360度）を即座に表示
          sky.setAttribute('visible', 'true');
          sky.setAttribute('material', 'opacity', '1');

          // 3秒後に画像と文字を表示
          setTimeout(() => {
            sprite.emit('start-fadein');
            sprite.emit('start-shrinking');
            
            msg.setAttribute('visible', 'true');
            msg.setAttribute('material', 'opacity', '1');
          }, 3000);
        }
      });
    </script>
  </body>
</html>
