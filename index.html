<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene 
      embedded 
      vr-mode-ui="enabled: false;" 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="precision: medium; logarithmicDepthBuffer: true; antialias: true;">
      
      <a-assets>
        <img id="testImage" src="test.png">
        <img id="originalImg" src="original_v2.png">
      </a-assets>

      <a-image 
        id="bg-panel"
        src="#testImage" 
        position="0 0 -40" 
        scale="100 60 1" 
        material="shader: flat; transparent: true; opacity: 0;"
        visible="false">
      </a-image>

      <a-entity camera id="main-camera" look-controls>
        
        <a-image 
          id="original-sprite"
          src="#originalImg" 
          position="0 0 -5" 
          scale="10 10 1"
          material="shader: flat; transparent: true; opacity: 0; alphaTest: 0.5; depthWrite: false;"
          animation="property: scale; to: 2 2 1; dur: 3000; easing: easeOutQuad; startEvents: start-shrinking"
          animation__fade="property: material.opacity; to: 1; dur: 500; startEvents: start-fadein">
        </a-image>

        <a-text 
          id="message-text"
          value="WELCOME TO SANOTECH NIGHT" 
          position="0 1.2 -2" 
          align="center" 
          color="#FF00FF" 
          width="4"
          material="shader: flat; transparent: true; opacity: 0; depthTest: false;"
          visible="false">
        </a-text>

      </a-entity>

      <a-marker preset="hiro" id="marker-switch"></a-marker>
      
    </a-scene>

    <script>
      const marker = document.querySelector('#marker-switch');
      const bg = document.querySelector('#bg-panel');
      const sprite = document.querySelector('#original-sprite');
      const msg = document.querySelector('#message-text');
      
      let isTriggered = false;

      // iPad対策：クリックイベント
      window.addEventListener('click', function () {
          console.log("Device Ready");
      });

      marker.addEventListener('markerFound', () => {
        if (!isTriggered) {
          isTriggered = true;

          // ① 背景を即座に表示
          bg.setAttribute('visible', 'true');
          bg.setAttribute('material', 'opacity', '1');

          // ② 3秒後に画像と文字を表示
          setTimeout(() => {
            // メイン画像の演出
            sprite.emit('start-fadein');
            sprite.emit('start-shrinking');
            
            // 文字の表示（背景画像より手前に来るように設定済み）
            msg.setAttribute('visible', 'true');
            msg.setAttribute('material', 'opacity', '1');
          }, 3000);
        }
      });
    </script>
  </body>
</html>
