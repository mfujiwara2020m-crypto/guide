<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* 【修正1】起動時の全画面画像を画面いっぱいに大きく表示 */
      #start-screen {
        position: fixed;
        top: 0; left: 0;
        width: 100vw;   /* 画面幅いっぱい */
        height: 100vh;  /* 画面高さいっぱい */
        background-color: black; /* 背景を黒に */
        z-index: 999;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden; /* はみ出し防止 */
      }
      #start-screen img {
        /* アスペクト比を保ちつつ、画面を覆うように拡大 */
        width: 100%;
        height: 100%;
        object-fit: cover; /* 画面に収めるなら contain、画面いっぱいなら cover */
      }
      #start-screen p {
        position: absolute;
        bottom: 10%;
        left: 50%;
        transform: translateX(-50%);
        color: white;
        background-color: rgba(0,0,0,0.5);
        padding: 10px;
        border-radius: 5px;
        font-family: sans-serif;
      }
    </style>
  </head>

  <body style="margin:0px; overflow:hidden;">
    
    <div id="start-screen">
      <img src="test.png" alt="Test Image">
      <p>Hiroマーカーをかざしてください</p>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false;" arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <img id="testImage" src="test.png">
        <img id="originalImage" src="original.png">
      </a-assets>

      <a-marker preset="hiro" id="marker">
        
        <a-image 
          src="#testImage" 
          position="0 0.01 0" /* チラつき防止のため、0よりわずかに上に配置 */
          rotation="-90 0 0" 
          width="1" height="1">
        </a-image>

        <a-text 
          value="Sano Tech NIGHT" 
          position="0 0.5 0" /* メッセージは少し上に浮かせる */
          align="center" 
          color="purple" 
          rotation="-90 0 0" 
          width="4">
        </a-text>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // マーカーを検知したら全画面画像を消す処理
      const marker = document.querySelector('#marker');
      const startScreen = document.querySelector('#start-screen');

      marker.addEventListener('markerFound', () => {
        startScreen.style.display = 'none'; // マーカーが見つかったら全画面画像を非表示に
      });

      // マーカーが外れたら、全画面画像を再度表示させる設定
      // marker.addEventListener('markerLost', () => {
      //   startScreen.style.display = 'flex'; 
      // });
    </script>
  </body>
</html>
