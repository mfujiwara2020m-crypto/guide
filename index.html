<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin:0px; overflow:hidden;">
    <a-scene embedded vr-mode-ui="enabled: false;" arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <img id="testImage" src="test.png">
        <img id="originalImg" src="original.png">
      </a-assets>

      <a-entity camera id="main-camera" look-controls>
        
        <a-image 
          id="bg-panel"
          src="#testImage" 
          position="0 0 -20" 
          scale="40 25 1" 
          material="shader: flat; opacity: 0; transparent: true;">
        </a-image>

        <a-image 
          id="original-sprite"
          src="#originalImg" 
          position="0 0 -5" 
          scale="10 10 1"
          material="shader: flat; opacity: 0; transparent: true;"
          animation="property: scale; to: 2 2 1; dur: 3000; easing: easeOutQuad; startEvents: start-shrinking"
          animation__fade="property: material.opacity; to: 1; dur: 500; startEvents: start-fadein">
        </a-image>

        <a-text 
          id="message-text"
          value="Sano Tech NIGHT" 
          position="0 1.5 -4" 
          align="center" 
          color="purple" 
          width="6"
          material="opacity: 0; transparent: true;">
        </a-text>

      </a-entity>

      <a-marker preset="hiro" id="marker-switch"></a-marker>
      
    </a-scene>

    <script>
      const marker = document.querySelector('#marker-switch');
      const bg = document.querySelector('#bg-panel');
      const sprite = document.querySelector('#original-sprite');
      const msg = document.querySelector('#message-text');
      
      let isTriggered = false;

      // マーカーを検知した時の処理
      marker.addEventListener('markerFound', () => {
        if (!isTriggered) {
          isTriggered = true;
          console.log("マーカー検知！演出を開始します...");

          // ① 即座に背景を不透明にする
          bg.setAttribute('material', 'opacity', '1');

          // ② 3秒(3000ms)待ってからメイン画像を表示
          setTimeout(() => {
            // フェードインと縮小アニメーションを開始
            sprite.emit('start-fadein');
            sprite.emit('start-shrinking');
            
            // メッセージも表示
            msg.setAttribute('material', 'opacity', '1');
            console.log("演出完了");
          }, 3000);
        }
      });
    </script>
  </body>
</html>
