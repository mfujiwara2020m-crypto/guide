<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin:0px; overflow:hidden;">
    <a-scene 
      embedded 
      vr-mode-ui="enabled: false;" 
      arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <img id="testImage" src="test.png">
        <img id="originalImg" src="original.png">
      </a-assets>

      <a-image 
        id="bg-panel"
        src="#testImage" 
        position="0 0 -100" 
        scale="200 120 1" 
        shader="flat"
        visible="false">
      </a-image>

      <a-marker preset="hiro" id="marker">
        <a-image 
          src="#originalImg" 
          position="0 0.5 0" 
          rotation="-90 0 0" 
          width="2" height="2">
        </a-image>

        <a-text 
          value="Sano Tech NIGHT" 
          position="0 1.5 0" 
          align="center" 
          color="purple" 
          rotation="-90 0 0" 
          width="6">
        </a-text>
      </a-marker>

      <a-entity camera look-controls></a-entity>
      
    </a-scene>

    <script>
      const marker = document.querySelector('#marker');
      const bgPanel = document.querySelector('#bg-sky') || document.querySelector('#bg-panel');
      let isFound = false;

      // マーカーを一度でも見つけたら実行
      marker.addEventListener('markerFound', function() {
        if (!isFound) {
          isFound = true;
          // 背景を表示する
          bgPanel.setAttribute('visible', 'true');
          console.log("マーカー検知：背景とARを表示しました");
        }
      });

      // マーカーから外れても消さない設定
      marker.addEventListener('markerLost', function() {
        if (isFound) {
          // 強制的に表示を維持
          marker.setAttribute('visible', 'true');
          // AR.jsの内部的な非表示処理を上書きするために少し遅らせて再セット
          setTimeout(() => {
            marker.object3D.visible = true;
          }, 10);
        }
      });
    </script>
  </body>
</html>
