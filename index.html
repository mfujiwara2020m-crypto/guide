<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene 
      embedded 
      vr-mode-ui="enabled: false;" 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="logarithmicDepthBuffer: true;">
      
      <a-assets>
        <img id="testImage" src="test.png">
        <img id="originalImg" src="original.png">
      </a-assets>

      <a-image 
        id="bg-panel"
        src="#testImage" 
        position="0 0 -20" 
        scale="60 40 1" 
        material="shader: flat; transparent: true; opacity: 0;"
        visible="false">
      </a-image>

      <a-entity camera id="main-camera" look-controls>
        
        <a-image 
          id="original-sprite"
          src="#originalImg" 
          position="0 0 -5" 
          scale="10 10 1"
          material="shader: flat; transparent: true; opacity: 0; alphaTest: 0.5;"
          animation="property: scale; to: 2 2 1; dur: 3000; easing: easeOutQuad; startEvents: start-shrinking"
          animation__fade="property: material.opacity; to: 1; dur: 500; startEvents: start-fadein">
        </a-image>

        <a-text 
          id="message-text"
          value="Sano Tech NIGHT" 
          position="0 1.5 -4" 
          align="center" 
          color="purple" 
          width="6"
          visible="false">
        </a-text>

      </a-entity>

      <a-marker preset="hiro" id="marker-switch"></a-marker>
      
    </a-scene>

    <script>
      const marker = document.querySelector('#marker-switch');
      const bg = document.querySelector('#bg-panel');
      const sprite = document.querySelector('#original-sprite');
      const msg = document.querySelector('#message-text');
      
      let isTriggered = false;

      marker.addEventListener('markerFound', () => {
        if (!isTriggered) {
          isTriggered = true;
          console.log("マーカーを検知しました");

          // 背景を不透明にして表示（即時）
          bg.setAttribute('visible', 'true');
          bg.setAttribute('material', 'opacity', '1');

          // 3秒後に original.png を巨大な状態から縮小させて出す
          setTimeout(() => {
            sprite.emit('start-fadein');
            sprite.emit('start-shrinking');
            msg.setAttribute('visible', 'true');
            console.log("演出を開始しました");
          }, 3000);
        }
      });
    </script>
  </body>
</html>
