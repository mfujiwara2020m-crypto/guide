<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene 
      embedded 
      vr-mode-ui="enabled: false;" 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="precision: medium; logarithmicDepthBuffer: true;">
      
      <a-assets>
        <img id="testImage" src="360seimon.jpg">
        <img id="originalImg" src="original_v2.png">
        <img id="messageImg" src="message.png">
      </a-assets>

      <a-image 
        id="bg-panel"
        src="#testImage" 
        position="0 0 -40" 
        scale="100 60 1" 
        material="shader: flat; transparent: true; opacity: 0;"
        visible="false">
      </a-image>

      <a-entity camera id="main-camera" look-controls>
        
        <a-image 
          id="original-sprite"
          src="#originalImg" 
          position="0 0 -5" 
          scale="10 8 1"
          material="shader: flat; transparent: true; opacity: 0; alphaTest: 0.5; depthWrite: false; depthTest: false;"
          animation="property: scale; to: 2 1.6 1; dur: 3000; easing: easeOutQuad; startEvents: start-shrinking"
          animation__fade="property: material.opacity; to: 1; dur: 500; startEvents: start-fadein">
        </a-image>

     <a-image
  id="message-text"
  src="#messageImg"
  /* y=0.8（少し下げる）, z=-3.0（少し奥へ） */
  position="0 0.8 -3.0" 
  /* 4 5 1だと縦長すぎるので、横長の 3 1 1 程度に */
  scale="3 1 1" 
  material="shader: flat; transparent: true; opacity: 0; alphaTest: 0.1; depthWrite: false; depthTest: false;"
  visible="false">
</a-image>

      </a-entity>

      <a-marker preset="hiro" id="marker-switch"></a-marker>
    </a-scene>

    <script>
      const marker = document.querySelector('#marker-switch');
      const bg = document.querySelector('#bg-panel');
      const sprite = document.querySelector('#original-sprite');
      const msg = document.querySelector('#message-text');
      
      let isTriggered = false;

      // 画面タップでセンサーを有効化
      window.addEventListener('touchstart', () => { console.log("Sensors active"); });

      marker.addEventListener('markerFound', () => {
        if (!isTriggered) {
          isTriggered = true;

          // 背景を即座に表示
          bg.setAttribute('visible', 'true');
          bg.setAttribute('material', 'opacity', '1');

          // 3秒後に演出開始
          setTimeout(() => {
            // メイン画像の表示と縮小
            sprite.emit('start-fadein');
            sprite.emit('start-shrinking');
            
            // メッセージ画像の表示（不透明度を1にする命令を明確に出す）
            msg.setAttribute('visible', 'true');
            msg.setAttribute('material', 'opacity', '1');
            console.log("Message displayed");
          }, 3000);
        }
      });
    </script>
  </body>
</html>
