<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin:0px; overflow:hidden;">
    <a-scene embedded vr-mode-ui="enabled: false;" arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <img id="testImage" src="test.png">
        <img id="originalImg" src="original.png">
      </a-assets>

      <a-entity camera look-controls>
        <a-image 
          src="#testImage" 
          position="0 0 -20" 
          scale="40 25 1" 
          shader="flat">
        </a-image>

        <a-video 
          id="webcam-view"
          src="#video"
          position="0 0 -1" 
          width="1.2" height="0.8"
          material="opacity: 0.8">
        </a-video>
      </a-entity>

      <a-marker preset="hiro">
        <a-image 
          src="#originalImg" 
          position="0 0.5 0" 
          rotation="-90 0 0" 
          width="2" height="2">
        </a-image>

        <a-text 
          value="Sano Tech NIGHT" 
          position="0 1.5 0" 
          align="center" 
          color="purple" 
          rotation="-90 0 0" 
          width="6">
        </a-text>
      </a-marker>

    </a-scene>

    <script>
      // カメラ映像を a-video に流し込む処理
      window.addEventListener('load', function () {
        const scene = document.querySelector('a-scene');
        if (scene.hasLoaded) {
          setupVideo();
        } else {
          scene.addEventListener('loaded', setupVideo);
        }

        function setupVideo() {
          const video = document.querySelector('video'); // AR.jsが生成したvideoタグ
          if (video) {
            video.id = 'video';
            const videoView = document.querySelector('#webcam-view');
            videoView.setAttribute('src', '#video');
          }
        }
      });
    </script>
  </body>
</html>
