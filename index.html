<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin:0px; overflow:hidden;">
    <a-scene 
      embedded 
      vr-mode-ui="enabled: false;" 
      arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <img id="testImage" src="test.png">
        <img id="originalImg" src="original.png">
      </a-assets>

      <a-image 
        id="bg-panel"
        src="#testImage" 
        position="0 0 -20" 
        scale="40 25 1" 
        shader="flat"
        visible="false">
      </a-image>

      <a-marker preset="hiro" id="marker">
        <a-entity id="ar-content" visible="false">
          
          <a-image 
            id="original-sprite"
            src="#originalImg" 
            position="0 0 0" 
            scale="5 5 1"
            animation="property: scale; to: 1.5 1.5 1; dur: 3000; easing: easeInOutQuad; startEvents: start-shrinking">
          </a-image>

          <a-text 
            id="message-text"
            value="Sano Tech NIGHT" 
            position="0 1.2 0" 
            align="center" 
            color="purple" 
            width="6"
            visible="false">
          </a-text>
        </a-entity>
      </a-marker>

      <a-entity camera id="main-camera" look-controls></a-entity>
      
    </a-scene>

    <script>
      const marker = document.querySelector('#marker');
      const content = document.querySelector('#ar-content');
      const bgPanel = document.querySelector('#bg-panel');
      const camera = document.querySelector('#main-camera');
      const sprite = document.querySelector('#original-sprite');
      const message = document.querySelector('#message-text');
      let isFound = false;

      marker.addEventListener('markerFound', function() {
        if (!isFound) {
          isFound = true;
          
          // ステップ1: 背景を表示してカメラに固定（即時）
          bgPanel.setAttribute('visible', 'true');
          camera.appendChild(bgPanel);

          // ステップ2: 3秒後(3000ms)に original を巨大なサイズで出現させる
          setTimeout(() => {
            content.setAttribute('visible', 'true');
            content.setAttribute('position', '0 0 -5'); // カメラの5m先に固定
            camera.appendChild(content);

            // ステップ3: 出現と同時に縮小アニメーションを開始
            sprite.emit('start-shrinking');
            
            // メッセージも少し遅れて、あるいは同時に出す
            message.setAttribute('visible', 'true');
          }, 3000);
        }
      });
    </script>
  </body>
</html>
