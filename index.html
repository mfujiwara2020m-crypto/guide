<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin:0px; overflow:hidden;">
    <a-scene embedded vr-mode-ui="enabled: false;" arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <img id="testImage" src="test.png">
        <img id="originalImg" src="original.png">
      </a-assets>

      <a-sky 
        id="bg-sky"
        src="#testImage" 
        rotation="0 -90 0" 
        opacity="0.6"
        animation="property: components.material.material.opacity; dur: 500;">
      </a-sky>

      <a-marker preset="hiro" id="hiro-marker">
        <a-image 
          src="#originalImg" 
          position="0 0.5 0" 
          rotation="-90 0 0" 
          width="2" height="2">
        </a-image>

        <a-text 
          value="Sano Tech NIGHT" 
          position="0 1.5 0" 
          align="center" 
          color="purple" 
          rotation="-90 0 0" 
          width="6">
        </a-text>
      </a-marker>

      <a-entity camera look-controls></a-entity>
    </a-scene>

    <script>
      const marker = document.querySelector('#hiro-marker');
      const sky = document.querySelector('#bg-sky');

      // マーカーを見つけた時：背景を100%不透明にし、くっきり表示
      marker.addEventListener('markerFound', () => {
        sky.setAttribute('opacity', '1.0');
      });

      // マーカーを見失った時：再び少し透かしてマーカーを探せるようにする
      marker.addEventListener('markerLost', () => {
        sky.setAttribute('opacity', '0.6');
      });
    </script>
  </body>
</html>
