<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin:0px; overflow:hidden;">
    <a-scene 
      embedded 
      vr-mode-ui="enabled: false;" 
      arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <img id="testImage" src="test.png">
        <img id="originalImg" src="original.png">
      </a-assets>

      <a-image 
        src="#testImage" 
        position="0 0 -100" 
        scale="200 120 1" 
        shader="flat">
      </a-image>

      <a-marker preset="hiro" id="marker">
        <a-image 
          src="#originalImg" 
          position="0 0.5 0" 
          rotation="-90 0 0" 
          width="2" height="2">
        </a-image>

        <a-text 
          value="Sano Tech NIGHT" 
          position="0 1.5 0" 
          align="center" 
          color="purple" 
          rotation="-90 0 0" 
          width="6">
        </a-text>
      </a-marker>

      <a-entity camera look-controls></a-entity>
      
    </a-scene>

    <script>
      // マーカーが外れても消えないようにするスクリプト
      const marker = document.querySelector('#marker');
      
      marker.addEventListener('markerFound', function() {
        console.log("マーカーを検知しました");
      });

      // マーカーを見失った（はずれた）時のイベントを上書き
      marker.addEventListener('markerLost', function(e) {
        // デフォルトの「消去」を阻止し、表示を維持させる
        // ただし、AR.js内部で非表示にされる場合があるため、以下の処理で強制表示します
        setTimeout(() => {
          marker.object3D.visible = true;
        }, 10);
      });
    </script>
  </body>
</html>
